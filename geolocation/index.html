<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>位置情報取得サンプル</title>
</head>
<body>
    <h1>位置情報取得サンプル</h1>
    <button id="getLocation">位置情報を取得</button>
    <div id="result"></div>

    <script>
    /**
     * 位置情報を取得するためのスクリプト
     * 毎回位置情報の許可を求めるため、maximumAgeを0に設定し、
     * enableHighAccuracyを切り替えることで新しい許可を要求します
     */
    let highAccuracy = true;  // 精度設定を切り替えるためのフラグ

    const getLocationWithPrompt = () => {
        // 位置情報が利用可能かチェック
        if (!navigator.geolocation) {
            alert('お使いのブラウザは位置情報に対応していません');
            return;
        }

        // 位置情報の取得（精度設定を毎回切り替えることで新しい許可を要求）
        navigator.geolocation.getCurrentPosition(
            // 成功時のコールバック
            (position) => {
                const latitude = position.coords.latitude;
                const longitude = position.coords.longitude;
                
                document.getElementById('result').innerHTML = `
                    <p>緯度: ${latitude}</p>
                    <p>経度: ${longitude}</p>
                `;
                // 次回の要求用に精度設定を反転
                highAccuracy = !highAccuracy;
            },
            // エラー時のコールバック
            (error) => {
                let errorMessage = '';
                switch (error.code) {
                    case error.PERMISSION_DENIED:
                        errorMessage = '位置情報の利用が許可されていません';
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMessage = '位置情報が取得できませんでした';
                        break;
                    case error.TIMEOUT:
                        errorMessage = '位置情報の取得がタイムアウトしました';
                        break;
                    default:
                        errorMessage = '予期せぬエラーが発生しました';
                        break;
                }
                document.getElementById('result').innerHTML = `<p>エラー: ${errorMessage}</p>`;
                // 次回の要求用に精度設定を反転
                highAccuracy = !highAccuracy;
            },
            // オプション（精度設定を毎回切り替える）
            {
                enableHighAccuracy: highAccuracy,
                timeout: 5000,
                maximumAge: 0
            }
        );
    };

    // ページロード時に実行
    window.addEventListener('load', getLocationWithPrompt);

    // ボタンクリック時に実行
    document.getElementById('getLocation').addEventListener('click', getLocationWithPrompt);
    </script>
</body>
</html>
