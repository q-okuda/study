<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>事業所検索</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main class="main">
        <div class="search_container">
            <div class="search_wrap">
                <!-- 現在地から探すセクション -->
                <section class="search_box">
                    <button class="search_location_button">
                        <span class="search_location_icon">
                            <img src="./assets/images/location-icon.svg" alt="位置情報アイコン">
                        </span>
                        <span class="search_location_text">現在地から取り扱い事業所を探す</span>
                    </button>
                </section>

                <!-- 住所検索セクション -->
                <section class="search_box">
                    <div class="search_address">
                        <span class="search_address_icon">
                            <img src="./assets/images/search-icon.svg" alt="検索アイコン">
                        </span>
                        <input type="text" class="search_address_input" placeholder="〒107-0061 東京都港区北青山3">
                    </div>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
